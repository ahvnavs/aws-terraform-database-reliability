name: "Terraform CI/CD & Security"

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform-checks:
    name: "Terraform Plan & Scan"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        environment: [dev, prod]

    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: "Terraform Format"
        run: terraform fmt -check -recursive
        working-directory: infra/envs/${{ matrix.environment }}

      - name: "Terraform Init"
        run: terraform init
        working-directory: infra/envs/${{ matrix.environment }}

      - name: "Terraform Validate"
        run: terraform validate
        working-directory: infra/envs/${{ matrix.environment }}

      - name: "Security Scan (tfsec)"
        uses: aquasecurity/tfsec-pr-commenter-action@v1.2.0
        with:
          working_directory: infra/envs/${{ matrix.environment }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Terraform Plan"
        id: plan
        run: terraform plan -no-color -refresh=false -out=tfplan
        working-directory: infra/envs/${{ matrix.environment }}
        env:
          AWS_ACCESS_KEY_ID: dummy
          AWS_SECRET_ACCESS_KEY: dummy
          AWS_REGION: ap-south-1

      - name: "Post Plan to GitHub PR"
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Plan for \`${{ matrix.environment }}\` Environment 🚀

            <details><summary>Click to expand the plan</summary>

            \`\`\`terraform
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })
